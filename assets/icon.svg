<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Card stack (back) -->
  <rect x="120" y="80" width="300" height="380" rx="20" fill="white" opacity="0.2" transform="rotate(5, 270, 270)"/>
  <!-- Card stack (front) -->
  <rect x="96" y="76" width="300" height="380" rx="20" fill="white" opacity="0.95"/>
  <!-- Title bar area -->
  <rect x="96" y="76" width="300" height="56" rx="20" fill="#f1f5f9"/>
  <rect x="96" y="112" width="300" height="20" fill="#f1f5f9"/>
  <!-- Title bar dots -->
  <circle cx="130" cy="104" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="152" cy="104" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="174" cy="104" r="7" fill="#22c55e" opacity="0.8"/>
  <!-- Headline text lines -->
  <rect x="126" y="152" width="200" height="12" rx="6" fill="#1e293b" opacity="0.8"/>
  <rect x="126" y="174" width="160" height="12" rx="6" fill="#1e293b" opacity="0.5"/>
  <!-- Image placeholder -->
  <rect x="126" y="204" width="240" height="100" rx="12" fill="#e2e8f0"/>
  <!-- Mountain icon in image -->
  <polygon points="186,280 216,240 246,270 266,250 306,280" fill="#94a3b8" opacity="0.6"/>
  <circle cx="290" cy="232" r="14" fill="#fbbf24" opacity="0.5"/>
  <!-- Body text lines -->
  <rect x="126" y="322" width="240" height="8" rx="4" fill="#64748b" opacity="0.5"/>
  <rect x="126" y="340" width="200" height="8" rx="4" fill="#64748b" opacity="0.5"/>
  <rect x="126" y="358" width="220" height="8" rx="4" fill="#64748b" opacity="0.5"/>
  <rect x="126" y="376" width="140" height="8" rx="4" fill="#64748b" opacity="0.5"/>
  <!-- Swipe arrow indicator (bottom right) -->
  <g transform="translate(380, 390)">
    <circle cx="0" cy="0" r="42" fill="white" opacity="0.25"/>
    <polyline points="-12,-14 12,0 -12,14" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Slide dots (bottom) -->
  <circle cx="196" cy="432" r="6" fill="white" opacity="0.9"/>
  <circle cx="216" cy="432" r="6" fill="white" opacity="0.4"/>
  <circle cx="236" cy="432" r="6" fill="white" opacity="0.4"/>
  <circle cx="256" cy="432" r="6" fill="white" opacity="0.4"/>
  <circle cx="276" cy="432" r="6" fill="white" opacity="0.4"/>
</svg>
